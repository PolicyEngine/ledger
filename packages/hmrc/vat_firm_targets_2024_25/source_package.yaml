  vintage: fiscal_year_2024_25
  extracted_at: "2026-06-27"
  extraction_method: >-
    curated CSV extract from HMRC Annual UK VAT Statistics 2024 to 2025
    turnover-band tables; 2024-25 sub-bands between GBP 1 million and GBP 10
