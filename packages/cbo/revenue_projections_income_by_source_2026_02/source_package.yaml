        concept_relation: source_label
        concept_authority: cbo
        concept_evidence_url: https://www.cbo.gov/system/files/2026-02/51138-2026-02-Revenue-Projections.xlsx
        concept_evidence_notes: >-
          CBO Revenue Projections, by Category, February 2026, sheet
          3.Individual Income Tax Details. CBO's income-by-source row is kept as
