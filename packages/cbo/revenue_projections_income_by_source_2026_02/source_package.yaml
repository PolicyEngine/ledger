schema_version: arch.source_package.v1
package_id: cbo-revenue-projections-income-by-source-2026-02
label: CBO February 2026 revenue projections income by source
artifact:
  source_name: cbo
  source_table: Revenue Projections, by Category, February 2026, sheet 3.Individual Income Tax Details
  resource_package: db
  resource_directory: data/cbo/revenue_projections_income_by_source_2026_02
  manifest: manifest.yaml
  vintage: cbo_2026_02_baseline
  extracted_at: "2026-05-19"
  extraction_method: >-
    curated CSV extract from CBO February 2026 Revenue Projections workbook
    sheet 3.Individual Income Tax Details; direct publisher workbook URL
    returned HTTP 403 DataDome from the agent shell on 2026-05-19
  parser: delimited_text_full_rows
  sheet_name: income_by_source
  artifact_year: 2026
  selected_rows:
    - source_concept_id: adjusted_gross_income
    - source_concept_id: wages_and_salaries
    - source_concept_id: taxable_interest_and_ordinary_dividends_excluding_qualified_dividends
    - source_concept_id: qualified_dividend_income
    - source_concept_id: net_capital_gain
    - source_concept_id: net_business_income
record_sets:
  - record_set_id: cbo.revenue_projection.ty{year}.income_by_source
    record_set_spec_id: cbo.revenue_projection.income_by_source.v1
    source_record_id_prefix: cbo.revenue_projection.ty{year}.income_by_source
    sheet_name: income_by_source
    period_type: tax_year
    period: "{year}"
    geography_id: 0100000US
    geography_level: country
    geography_name: United States
    geography_vintage: current
    entity: tax_unit
    entity_role: filing_unit
    domain: individual_income_tax_returns
    groupby_dimension: cbo.income_source
    shared_constraints:
      - variable: cbo.release_vintage
        operator: "=="
        value: "2026-02-baseline"
        label: CBO baseline release vintage
      - variable: cbo.projection_status
        operator: "=="
        value: cbo_february_2026_baseline_projection
        label: CBO projection status
    rows:
      - value_id: adjusted_gross_income
        label: Total AGI
        ordinal: 0
        row_number: 2
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: adjusted_gross_income
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: adjusted_gross_income
            label: CBO income source
        guard_cells:
          - column: B
            expected_value: Total AGI
            label: CBO row label
      - value_id: wages_and_salaries
        label: Total employment income
        ordinal: 1
        row_number: 3
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: wages_and_salaries
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: wages_and_salaries
            label: CBO income source
        guard_cells:
          - column: B
            expected_value: Total employment income
            label: CBO row label
      - value_id: taxable_interest_and_ordinary_dividends_excluding_qualified_dividends
        label: Taxable interest and ordinary dividends excluding qualified dividends
        ordinal: 2
        row_number: 4
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: taxable_interest_and_ordinary_dividends_excluding_qualified_dividends
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: taxable_interest_and_ordinary_dividends_excluding_qualified_dividends
            label: CBO income source
        guard_cells:
          - column: D
            expected_value: >-
              CBO row excludes qualified dividends; do not combine this with
              broad dividend income that already includes qualified dividends
            label: CBO exclusion note
      - value_id: qualified_dividend_income
        label: Qualified dividends
        ordinal: 3
        row_number: 5
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: qualified_dividend_income
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: qualified_dividend_income
            label: CBO income source
        guard_cells:
          - column: B
            expected_value: Qualified dividends
            label: CBO row label
      - value_id: net_capital_gain
        label: Net capital gain
        ordinal: 4
        row_number: 6
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: net_capital_gain
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: net_capital_gain
            label: CBO income source
        guard_cells:
          - column: B
            expected_value: Net capital gain
            label: CBO row label
      - value_id: net_business_income
        label: Net business income
        ordinal: 5
        row_number: 7
        table_record_kind: detail
        expected_row_header_column: A
        expected_row_header: net_business_income
        constraints:
          - variable: cbo.income_source
            operator: "=="
            value: net_business_income
            label: CBO income source
        guard_cells:
          - column: D
            expected_value: >-
              CBO net business income is broader than narrow self-employment
              income and should not be mapped to self_employment_income
              without review
            label: CBO business income scope note
    measures:
      - measure_id: projected_amount
        label: CBO projected amount
        ordinal: 0
        column_by_year:
          2023: E
          2024: F
          2025: G
          2026: H
          2027: I
          2028: J
          2029: K
          2030: L
          2031: M
          2032: "N"
          2033: O
          2034: P
          2035: Q
          2036: R
        source_column_id: year_{year}
        expected_column_header_row: 1
        expected_column_header: year_{year}
        concept: cbo.income_by_source_projection
        source_concept: cbo.income_by_source_projection
        concept_relation: source_label
        concept_authority: cbo
        concept_evidence_url: https://www.cbo.gov/system/files/2026-02/51138-2026-02-Revenue-Projections.xlsx
        concept_evidence_notes: >-
          CBO Revenue Projections, by Category, February 2026, sheet
          3.Individual Income Tax Details. Row-level constraints preserve the
          CBO source concept; downstream model adapters must not map the
          interest/dividend row to broad dividend income because the CBO row
          excludes qualified dividends.
        unit: usd
        aggregation: sum
        expected_cell_type: number
