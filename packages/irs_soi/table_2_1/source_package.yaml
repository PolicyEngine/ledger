        concept_authority: arch-us
        concept_evidence_url: https://uscode.house.gov/view.xhtml?req=(title:26%20section:62%20edition:prelim)
        concept_evidence_notes: >
          IRS SOI Table 2.1 reports adjusted gross income less deficit for
          individual income tax returns with itemized deductions; IRC section
