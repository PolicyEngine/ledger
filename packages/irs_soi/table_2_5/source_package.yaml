        row_number: 9
        expected_row_header_column: A
        expected_row_header: Total
        filters:
          income_range: all
          qualifying_children: all
        guard_cells:
          - column: A
            row: 1
            expected_value: "Table 2.5.  Returns with Earned Income Credit, by Size of Adjusted \nGross Income and Number of Qualifying Children, \nTax Year {year} (Filing Year {filing_year})"
            label: table title
        table_record_kind: total
    measures:
      - measure_id: eitc_return_count
        label: Returns with earned income credit
        ordinal: 0
        column: B
        source_column_id: eitc_return_count
        expected_column_header_row: 4
        expected_column_header: "Number of\nreturns"
        concept: irs_soi.returns_with_earned_income_credit
        unit: count
        aggregation: sum
        expected_cell_type: number
      - measure_id: adjusted_gross_income
        label: Adjusted gross income
        ordinal: 1
        column: C
        source_column_id: adjusted_gross_income
        expected_column_header_row: 4
        expected_column_header: "Adjusted\ngross income\nless deficit"
        concept: us:statutes/26/62#adjusted_gross_income
        source_concept: irs_soi.adjusted_gross_income
        concept_relation: exact
        concept_authority: arch-us
        concept_evidence_url: https://uscode.house.gov/view.xhtml?req=(title:26%20section:62%20edition:prelim)
        concept_evidence_notes: >
          IRS SOI Table 2.5 reports adjusted gross income less deficit for
          individual income tax returns with earned income credit; IRC section
          62 defines adjusted gross income. This Arch assertion treats the SOI
          total-row AGI column as adopting that legal concept for the tax-year
          source record.
        legal_vintage: tax_year_{year}
