    domain: all_individual_income_tax_returns
    groupby_dimension: us.tax.earned_income_credit_qualifying_children
    rows:
      - value_id: three_or_more_qualifying_children
        label: Three or more qualifying children
        ordinal: 0
        row_number: 144
        expected_row_header_column: A
        expected_row_header: "         Earned income credit with three or more qualifying children:  Number"
        filters:
