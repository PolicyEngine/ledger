        concept_evidence_notes: >
          IRS SOI Table 1.4 labels this measure Total wages for individual
          income tax returns. Axiom exposes wages as an inferred input to IRC
          section 62 adjusted gross income, so Arch treats the SOI total wages
          measure as a broad match to that input concept rather than an exact
          statutory definition.
