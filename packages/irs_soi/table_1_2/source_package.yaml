schema_version: arch.source_package.v1
package_id: soi-table-1-2
label: IRS SOI Publication 1304 Table 1.2 all returns tax items
artifact:
  source_name: irs_soi
  source_table: Publication 1304 Table 1.2
  resource_package: db
  resource_directory: data/irs_soi/table_1_2
  manifest: manifest.yaml
  vintage: tax_year_{year}
  extracted_at: "2026-05-11"
  extraction_method: xlrd whole-workbook used-range cell parse
record_sets:
  - record_set_id: irs_soi.ty{year}.table_1_2.all_returns
    record_set_spec_id: irs_soi.table_1_2.all_returns.v1
    source_record_id_prefix: irs_soi.ty{year}.table_1_2.all_returns
    sheet_name: TBL12
    period_type: tax_year
    period: "{year}"
    geography_id: 0100000US
    geography_level: country
    geography_name: United States
    geography_vintage: 2020_census
    entity: tax_unit
    entity_role: filing_unit
    domain: all_individual_income_tax_returns
    groupby_dimension: us:statutes/26/62#adjusted_gross_income
    rows:
      - value_id: all
        label: All returns, total
        ordinal: 0
        row_number: 9
        expected_row_header_column: A
        expected_row_header: All returns, total
        filters:
          filing_status: all
          income_range: all
        guard_cells:
          - column: B
            row: 3
            expected_value: All returns
            label: filing-status block
        table_record_kind: total
    measures:
      - measure_id: return_count
        label: Number of returns
        ordinal: 0
        column: B
        source_column_id: return_count
        expected_column_header_row: 4
        expected_column_header: "Number\nof\nreturns"
        concept: irs_soi.individual_income_tax_returns
        unit: count
        aggregation: count
        expected_cell_type: number
      - measure_id: adjusted_gross_income
        label: Adjusted gross income
        ordinal: 1
        column: C
        source_column_id: adjusted_gross_income
        expected_column_header_row: 4
        expected_column_header: "Adjusted\ngross income\nless\ndeficit"
        concept: us:statutes/26/62#adjusted_gross_income
        source_concept: irs_soi.adjusted_gross_income
        concept_relation: exact
        concept_authority: arch-us
        concept_evidence_url: https://uscode.house.gov/view.xhtml?req=(title:26%20section:62%20edition:prelim)
        concept_evidence_notes: >
          IRS SOI Table 1.2 reports adjusted gross income less deficit for
          individual income tax returns; IRC section 62 defines adjusted gross
          income. This Arch assertion treats the SOI all-returns AGI column as
          adopting that legal concept for the tax-year source record.
        legal_vintage: tax_year_{year}
        unit: usd
        aggregation: sum
        value_scale: 1000
        expected_cell_type: number
      - measure_id: total_itemized_deductions_amount
