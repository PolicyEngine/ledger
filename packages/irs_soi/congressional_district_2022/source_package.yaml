        concept_authority: arch-us
        concept_evidence_url: https://uscode.house.gov/view.xhtml?req=(title:26%20section:62%20edition:prelim)
        concept_evidence_notes: >
          IRS SOI congressional district files report adjusted gross income
          for individual income tax returns; IRC section 62 defines adjusted
          gross income. This Arch assertion treats the SOI AGI column as
          exactly adopting that legal concept for the tax-year source record.
        legal_vintage: tax_year_{year}
        unit: usd
        aggregation: sum
        value_scale: 1000
        expected_cell_type: number
