        label: Adjusted gross income
        ordinal: 2
        column: U
        source_column_id: A00100
        expected_column_header_row: 1
        expected_column_header: A00100
        concept: us:statutes/26/62#adjusted_gross_income
        source_concept: irs_soi.adjusted_gross_income
