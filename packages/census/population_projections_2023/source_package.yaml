schema_version: arch.source_package.v1
package_id: census-population-projections-2023
label: Census 2023 national population projections by single year of age
artifact:
  source_name: census_population_projections
  source_table: 2023 National Population Projections Main Series, middle series
  resource_package: db
  resource_directory: data/census/population_projections_2023
  manifest: manifest.yaml
  vintage: census_2023_population_projections
  extracted_at: '2026-05-11'
  extraction_method: official Census CSV full-row parse with selected year, all-race,
    all-sex native-born and foreign-born rows; age is encoded by POP_0..POP_85 source
    columns
  parser: delimited_text_full_rows
  sheet_name: np2023_d5_mid
  artifact_year: 2023
  selected_rows:
  - NATIVITY: 1
    RACE_HISP: 0
    SEX: 0
    YEAR: '{year}'
  - NATIVITY: 2
    RACE_HISP: 0
    SEX: 0
    YEAR: '{year}'
record_sets:
- record_set_id: census.popproj2023.cy{year}.national_population.age_0
  record_set_spec_id: census.popproj2023.national_population_by_age.v1
  source_record_id_prefix: census.popproj2023.cy{year}.national_population
  sheet_name: np2023_d5_mid
  period_type: calendar_year
  period: '{year}'
  geography_id: 0100000US
  geography_level: country
  geography_name: United States
  geography_vintage: current
  entity: person
  entity_role: resident_population
  domain: population_projection
  groupby_dimension: age
  rows:
  - value_id: age_0
    label: Age 0
    ordinal: 0
    row_number: 2
    row_end_number: 3
    expected_row_header_column: D
    expected_row_header: '{year}'
    constraints:
    - variable: age
      operator: '>='
      value: 0
      unit: years
      label: Age lower bound
    - variable: age
      operator: <
      value: 1
      unit: years
      label: Age upper bound
    guard_cells:
    - column: A
      row: start
      expected_value: 1
      label: native-born row
    - column: A
      row: end
      expected_value: 2
      label: foreign-born row
    - column: B
      row: start
      expected_value: 0
      label: all races and Hispanic origins
    - column: B
      row: end
      expected_value: 0
      label: all races and Hispanic origins
    - column: C
      row: start
      expected_value: 0
      label: all sexes
    - column: C
      row: end
      expected_value: 0
      label: all sexes
    - column: D
      row: start
      expected_value: '{year}'
      label: projection year
    - column: D
      row: end
      expected_value: '{year}'
      label: projection year
    table_record_kind: detail
  measures:
  - measure_id: population
    label: Projected population
    ordinal: 0
    column: F
    source_column_id: POP_0
    expected_column_header_row: 1
    expected_column_header: POP_0
    concept: census.population_projection
    source_concept: census.POP_0
    concept_relation: source_label
    concept_authority: census
    unit: count
    aggregation: count
    expected_cell_type: number
