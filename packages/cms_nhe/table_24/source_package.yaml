    concept_authority: ledger-us
    concept_evidence_url: https://www.cms.gov/data-research/statistics-trends-and-reports/national-health-expenditure-data/historical
    concept_evidence_notes: >
      CMS National Health Expenditure Accounts Table 24 reports the Employer
      Contribution to Private Health Insurance Premiums line: the employer
      share only, with the employee share carried on the separate Employee
      Contribution to Private Health Insurance Premiums line. The line spans
      private, federal, and state and local government employers, including
      contributions on behalf of retirees and COBRA continuation coverage
      (PolicyEngine/populace#454 concept resolution), and per Table 24
      footnotes 1-2 includes Medicare Retiree Drug Subsidy payments to
      employer plans beginning 2006, small business tax credits beginning
      2010, and Early Retirement Reinsurance Program payments for 2010-2011.
      PolicyEngine-US carries person-level
      employer_sponsored_insurance_premiums (annual employer-paid health
      insurance premiums); this NHEA calendar-year line is the national
      calibration anchor for that concept (PolicyEngine/populace#454).
    legal_vintage: calendar_year_{year}
    value_scale: 1000000000
    expected_cell_type: number
