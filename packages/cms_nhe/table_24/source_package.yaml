    source_concept: cms_nhe.private_employer_contribution_private_health_insurance_premiums
    concept_relation: broad_match
    concept_authority: ledger-us
    concept_evidence_url: https://www.cms.gov/data-research/statistics-trends-and-reports/national-health-expenditure-data/historical
    concept_evidence_notes: >
      Private Employers component of the CMS NHEA Table 24 Employer
      Contribution to Private Health Insurance Premiums line: employer share
      only and private-sector employers only, with federal and state and
      local government employer contributions carried on separate component
      lines. Per Table 24 footnote 1 it includes Medicare Retiree Drug
      Subsidy payments to private employer plans beginning 2006, small
      business tax credits beginning 2010, and Early Retirement Reinsurance
      Program payments for 2010-2011. This component is strictly narrower
      than both the Table 24 employer-contribution total and person-level
      employer_sponsored_insurance_premiums in PolicyEngine-US; it gives
      Populace a private-sector-only alternative anchor for that concept
      (PolicyEngine/populace#454).
