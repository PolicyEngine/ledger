name: Thesis facts append gate

# Deterministic review for every change to the observation ledger. Resolver
# appends arrive as pull requests targeting codex/thesis-ledger-facts; this
# gate enforces the immutable frozen prefix, an append-only diff against the
# PR base, the witnessed release chain, per-row schema and binding requirements,
# and explicit supersede semantics for corrections. Direct pushes get the same
# full-file checks.
#
# No paths filter, on purpose: branch protection lists "Append gate" as a
# required status check, so it must report on every pull request into the
# branch. With a paths filter, a PR that touches none of the gated files
# (tests, CI config) never receives the check and deadlocks on "Expected".
# For such PRs the append-only diff is trivially clean and the gate stays
# cheap.

on:
  pull_request:
    branches:
      - codex/thesis-ledger-facts
  push:
    branches:
      - codex/thesis-ledger-facts

jobs:
  append-gate:
    name: Append gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce append-only ledger invariants
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            git cat-file -e "${base_sha}^{commit}"
            python3 scripts/check_thesis_facts_append.py \
              --base-ref "$base_sha"
          else
            python3 scripts/check_thesis_facts_append.py
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Ledger observation invariants
        run: >
          uv run pytest
          tests/test_policyengine_ledger.py
          tests/test_release_chain.py
          tests/test_thesis_append_adversarial.py
          -q
